name: AI Testing Automation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run AI Evaluations
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: deno test --allow-net --allow-env tests/ai_eval.ts
