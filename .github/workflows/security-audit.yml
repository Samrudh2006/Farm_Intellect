name: Security Audit & Build Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security audit daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    name: Security Audit & Compliance Check
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # NPM audit for dependency vulnerabilities
      - name: Dependency Security Audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # Check for hardcoded secrets
      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug

      # SBOM Generation
      - name: Generate SBOM (Software Bill of Materials)
        run: bash scripts/generate-sbom.sh
        continue-on-error: true

      # CSP header validation
      - name: Validate Security Headers
        run: |
          echo "[v0] Validating CSP headers..."
          if grep -q "unsafe-eval" vercel.json; then
            echo "ERROR: Found 'unsafe-eval' in CSP - removes XSS protection"
            exit 1
          fi
          if grep -q "frame-ancestors 'none'" vercel.json; then
            echo "ERROR: frame-ancestors set to 'none' - breaks legitimate iframes"
            exit 1
          fi
          echo "[v0] CSP headers valid!"

      # Check for HTTPS and security.txt
      - name: Verify Security Files
        run: |
          echo "[v0] Checking for security.txt..."
          test -f "public/.well-known/security.txt" || echo "WARNING: security.txt not found"
          echo "[v0] Security file check complete"

      # ESLint security scan
      - name: ESLint Security Check
        run: npm run lint -- --format json > lint-report.json || true
        continue-on-error: true

      # Upload SBOM as artifact
      - name: Upload SBOM Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: sbom-report
          path: build/sbom.*
          retention-days: 30

      # Upload lint report
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lint-report
          path: lint-report.json
          retention-days: 30

  build-verification:
    runs-on: ubuntu-latest
    name: Build Verification
    needs: security-audit
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}

      - name: Verify build output
        run: |
          test -d "dist/" || { echo "ERROR: dist/ directory not found after build"; exit 1; }
          echo "[v0] Build verification passed!"

      - name: Check bundle size
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "[v0] Build size: $SIZE"
          # Fail if bundle exceeds 5MB (adjust threshold as needed)
          BYTES=$(du -sb dist/ | cut -f1)
          if [ $BYTES -gt 5242880 ]; then
            echo "WARNING: Bundle size exceeds 5MB ($SIZE)"
          fi

  deployment-ready:
    runs-on: ubuntu-latest
    name: Deployment Readiness
    needs: [security-audit, build-verification]
    if: success()
    
    steps:
      - name: Set deployment status
        run: |
          echo "[v0] All security checks passed!"
          echo "[v0] Build verification successful!"
          echo "[v0] Deployment ready for Vercel"
