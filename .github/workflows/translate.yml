name: Multilingual Translation Pipeline

on:
  push:
    paths:
      - 'public/locales/en.json'
    branches:
      - main
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Translation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx .github/scripts/translate.ts

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-translate en.json to 22 languages"
          title: "Auto-translate new content to 22 languages"
          body: "This PR contains automated translations for new strings in en.json generated by Gemini 1.5 Flash."
          branch: "auto-translation"
          delete-branch: true
